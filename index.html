<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --bot-bubble: rgba(255, 255, 255, 0.1);
            --user-bubble: linear-gradient(to right, #6366f1, #818cf8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            color: var(--text);
            overflow: hidden;
        }

        #app {
            width: 90%;
            max-width: 500px;
            height: 80vh;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--glass-border) transparent;
        }

        #chat-window::-webkit-scrollbar {
            width: 6px;
        }

        #chat-window::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: slideIn 0.3s ease-out;
            position: relative;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .bot-message {
            align-self: flex-start;
            background: var(--bot-bubble);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
        }

        .user-message {
            align-self: flex-end;
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .typing-indicator {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: none;
        }

        footer {
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid var(--glass-border);
        }

        .input-container {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            transition: border-color 0.3s ease;
        }

        .input-container:focus-within {
            border-color: var(--primary-light);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            padding: 8px 12px;
            font-size: 1rem;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            #app {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>AI Chatbot</h1>
        </header>

        <main id="chat-window">
            <div class="message bot-message">
                Hello! I'm your AI assistant. How can I help you today?
            </div>
            <div id="typing" class="typing-indicator">Bot is typing...</div>
        </main>

        <footer>
            <form id="chat-form">
                <div class="input-container">
                    <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
                    <button type="submit">Send</button>
                </div>
            </form>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing');

        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function createMessageElement(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(isUser ? 'user-message' : 'bot-message');
            msgDiv.textContent = text;
            return msgDiv;
        }

        function botReply() {
            typingIndicator.style.display = 'block';
            scrollToBottom();

            setTimeout(() => {
                typingIndicator.style.display = 'none';
                const botMsg = createMessageElement("This is a demo response", false);
                chatWindow.appendChild(botMsg);
                scrollToBottom();
            }, 1000);
        }

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            
            if (message) {
                // Add user message
                const userMsg = createMessageElement(message, true);
                chatWindow.appendChild(userMsg);
                userInput.value = '';
                scrollToBottom();

                // Trigger bot reply
                botReply();
            }
        });

        // Focus input on load
        window.onload = () => userInput.focus();
    </script>
</body>
</html>
