<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Image Generator — Editorial Typography Style." />
  <title>AI Image Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <!-- ── Header ──────────────────────────────────────────── -->
    <header class="header">
      <div class="header__meta">
        <div class="header__accent-bar"></div>
      </div>
      <h1>
        Conjure images from <br/><span class="accent-text">raw text.</span>
      </h1>
      <p class="lead">
        A stark, editorial interface for image synthesis. Type a description, strike generate, and let the model render. No distractions.
      </p>
    </header>

    <!-- ── Main Section ────────────────────────────────────── -->
    <main>
      <!-- Prompt Group -->
      <div class="prompt-group">
        <label for="promptInput" class="mono-label" style="display:block; margin-bottom: 16px;">// PROMPT SEQUENCE</label>
        <textarea
          class="prompt-input"
          id="promptInput"
          placeholder="Describe your vision precisely..."
        ></textarea>
        
        <div class="prompt-actions">
          <div class="suggestions">
            <button class="btn btn-ghost" onclick="useChip(this)">Abstract geometry</button>
            <button class="btn btn-ghost" onclick="useChip(this)">Brutalist architecture</button>
            <button class="btn btn-ghost" onclick="useChip(this)">Monochrome portrait</button>
          </div>
          
          <button class="btn btn-primary" id="generateBtn" onclick="handleGenerate()">
            Generate Output <span>→</span>
          </button>
        </div>
      </div>

      <!-- Error Banner -->
      <div class="error-banner" id="errorBanner">
        <span id="errorText"></span>
      </div>

      <!-- Loading Indicator -->
      <div class="loader" id="loader">
        <div class="loader__text">Rendering<span class="accent-text">.</span></div>
        <span class="mono-label">Processing via Diffusion Model</span>
      </div>

      <!-- Result Display -->
      <section class="result section" id="result">
        <div class="result__header">
          <h2 class="result__title">Output</h2>
          <span class="mono-label accent-text text-shadow-layer">GENERATION COMPLETE</span>
        </div>
        
        <div class="result__frame">
          <div class="result__image-wrapper">
            <img class="result__image" id="resultImage" alt="Generated Output" />
          </div>
          <div class="result__meta">
            <div class="result__prompt" id="resultPrompt"></div>
            <button class="btn btn-secondary" id="downloadBtn" onclick="downloadImage()">
              Download Asset
            </button>
          </div>
        </div>
      </section>

      <!-- Gallery -->
      <section class="gallery section" id="gallery">
        <div class="gallery__header">
          <h2 class="result__title">Archive</h2>
          <span class="mono-label" id="galleryCount">0 RECORDS</span>
        </div>
        <div class="gallery__grid" id="galleryGrid"></div>
      </section>

    </main>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
